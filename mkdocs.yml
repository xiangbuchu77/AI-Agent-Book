site_name: "AI Agent 开发圣经：从 LLM 到 Agent（2026）"
site_description: "An open-source technical book about AI Agent development."
site_url: "https://xiangbuchu77.github.io/AI-Agent-Book/"
repo_url: "https://github.com/xiangbuchu77/AI-Agent-Book"
repo_name: "xiangbuchu77/AI-Agent-Book"

theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  generator: false

nav:
  - 首页: index.md
  - 00 Preface: 00-Preface/index.md
  - 01 AI Basics: 01-AI-Basics/index.md
  - 02 Transformer: 02-Transformer/index.md
  - 03 Prompt: 03-Prompt/index.md
  - 04 RAG: 04-RAG/index.md
  - 05 Agent: 05-Agent/index.md
  - 06 LangGraph: 06-LangGraph/index.md
  - 07 MCP: 07-MCP/index.md
  - 08 Projects: 08-Projects/index.md
  - 09 System Design: 09-SystemDesign/index.md
  - 10 Interview: 10-Interview/index.md
